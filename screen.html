<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>互动弹幕墙 - 大屏端</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; }
        
        /* 弹幕展示区 (左侧) */
        #danmaku-area { flex: 1; position: relative; height: 100vh; overflow: hidden; }
        
        /* 弹幕动画 */
        .danmaku {
            position: absolute; white-space: nowrap; font-size: 36px; font-weight: bold; color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            animation: moveLeft 8s linear forwards;
        }
        @keyframes moveLeft { from { left: 100%; } to { left: -100%; } }

        /* 左下角扫码提示区 */
        .info-box {
            position: absolute; bottom: 30px; left: 30px; background: rgba(255,255,255,0.9); padding: 20px; 
            border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); display: flex; align-items: center; gap: 15px; z-index: 10;
        }
        #qrcode { width: 120px; height: 120px; }
        .text-info h2 { margin: 0 0 10px 0; color: #333; font-size: 20px;}
        .text-info p { margin: 0; color: #666; font-size: 14px;}

        /* 历史记录区 (右侧) */
        #history-sidebar {
            width: 300px; height: 100vh; background: #222; border-left: 1px solid #333; display: flex; flex-direction: column;
        }
        #history-sidebar h3 { color: #fff; text-align: center; margin: 20px 0; padding-bottom: 10px; border-bottom: 1px solid #444; }
        #history-list { flex: 1; overflow-y: auto; padding: 0 20px 20px 20px; margin: 0; list-style: none; color: #ccc; }
        #history-list li { padding: 10px; background: #333; margin-bottom: 10px; border-radius: 6px; word-break: break-all; font-size: 14px; }
        #clear-btn { background: #d9534f; color: white; border: none; padding: 15px; cursor: pointer; font-size: 16px; font-weight: bold; }
        #clear-btn:hover { background: #c9302c; }
        
        /* 滚动条美化 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #666; border-radius: 3px; }
    </style>
</head>
<body>
    <div id="danmaku-area">
        <div class="info-box">
            <div id="qrcode"></div>
            <div class="text-info">
                <h2>扫码发送弹幕 🚀</h2>
                <p>无需同一WiFi，随时随地互动</p>
            </div>
        </div>
    </div>

    <div id="history-sidebar">
        <h3>💬 历史留言板</h3>
        <ul id="history-list"></ul>
        <button id="clear-btn" onclick="clearHistory()">清空历史记录</button>
    </div>

    <script src="https://cdn.bootcdn.net/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script type="text/javascript" src="https://cdn.goeasy.io/goeasy-2.12.5.min.js"></script>

    <script>
        // ================= 1. 核心配置区 (请在此处修改) =================
        const APP_KEY = "BC-477df52be4244b719571f4b4f7eee208"; // 替换为你的 GoEasy Common Key
        const GITHUB_PAGES_URL = "https://sirilsw.github.io/Imtorch_test/"; // 替换为你的 GitHub Pages 手机端公网地址

        // ================= 2. 生成二维码 =================
        new QRCode(document.getElementById("qrcode"), {
            text: GITHUB_PAGES_URL,
            width: 120, height: 120
        });

        // ================= 3. 历史记录系统 (Local Storage) =================
        const historyListEl = document.getElementById('history-list');
        // 页面加载时，从本地读取历史记录
        let messageHistory = JSON.parse(localStorage.getItem('danmaku_history')) || [];
        
        // 渲染历史列表
        function renderHistory() {
            historyListEl.innerHTML = '';
            // 倒序展示，最新的在最上面
            [...messageHistory].reverse().forEach(msg => {
                const li = document.createElement('li');
                li.innerText = msg;
                historyListEl.appendChild(li);
            });
        }
        renderHistory();

        // 保存新消息到本地并更新列表
        function saveMessage(text) {
            messageHistory.push(text);
            localStorage.setItem('danmaku_history', JSON.stringify(messageHistory));
            renderHistory();
        }

        // 清空历史记录
        function clearHistory() {
            if(confirm('确定要清空所有屏幕上保留的历史留言吗？')) {
                messageHistory = [];
                localStorage.removeItem('danmaku_history');
                renderHistory();
            }
        }

        // ================= 4. GoEasy 接收弹幕 =================
        const goEasy = GoEasy.getInstance({
            host: "hangzhou.goeasy.io",
            appkey: APP_KEY,
            modules: ['pubsub']
        });

        goEasy.connect({
            onSuccess: function () { console.log("大屏连接成功，准备接收弹幕"); },
            onFailed: function (error) { alert("大屏连接失败，请检查 AppKey 或网络。"); }
        });

        goEasy.pubsub.subscribe({
            channel: "danmaku_room",
            onMessage: function (message) {
                const text = message.content;
                
                // 1. 保存到侧边栏历史记录
                saveMessage(text);

                // 2. 触发屏幕飞行效果
                const div = document.createElement('div');
                div.className = 'danmaku';
                div.innerText = text;
                
                // 随机高度 (10% - 80%)，避开最底部的二维码
                div.style.top = (Math.random() * 70 + 10) + '%';
                
                // 随机颜色
                const colors = ['#ffffff', '#ffeb3b', '#00e676', '#00e5ff', '#ff4081'];
                div.style.color = colors[Math.floor(Math.random() * colors.length)];

                document.getElementById('danmaku-area').appendChild(div);

                // 8秒后移除飞行元素
                setTimeout(() => div.remove(), 8000);
            }
        });
    </script>
</body>
</html>
